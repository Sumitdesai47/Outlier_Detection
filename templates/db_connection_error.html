<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Database unavailable</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-title">Process Intelligence</div>
      <nav class="sidebar-nav">
        {% include 'partials/sidebar_nav.html' %}
      </nav>
    </aside>
    <main class="main">
      <h1 class="h4 mb-3">Database unavailable</h1>
      <div class="alert alert-warning">
        <p class="mb-2">{{ message }}</p>
        <p class="small mb-0">Start MySQL on port <strong>3306</strong>, then run <code>python scripts/init_db.py</code>. See <code>db/MYSQL.md</code>.</p>
        <p class="small text-muted mb-0 mt-2">Docker is optional — use it only if you are not running MySQL on this machine.</p>
      </div>
      <p class="small"><a href="{{ url_for('main.index') }}">Back to home</a></p>
    </main>
  </div>
</body>
</html>
